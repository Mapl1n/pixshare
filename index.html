<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PixShare">
  <meta name="description" content="P2P 图片无损直传 — 跳过微信压缩，点对点原图传输">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>PixShare — P2P 无损传图</title>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-left">
        <div class="logo">📸</div>
        <div>
          <h1>PixShare</h1>
          <p class="header-sub">P2P 无损传图 · 不压缩画质</p>
        </div>
      </div>
      <div id="connection-status" class="conn-status disconnected">
        <span class="conn-dot"></span>
        <span id="conn-text">未连接</span>
      </div>
    </header>

    <main id="main-content">
      <!-- ============== SENDER MODE ============== -->
      <div id="sender-mode">
        <!-- Drop zone -->
        <div id="drop-zone" class="drop-zone">
          <div class="drop-icon">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <p class="drop-title">点击选择要发送的图片</p>
          <p class="drop-sub">或拖拽图片到此处</p>
          <input type="file" id="file-input" multiple accept="image/*,.heic,.heif,.avif" hidden>
        </div>

        <!-- File grid -->
        <div id="file-grid" class="file-grid hidden"></div>
        <div id="file-toolbar" class="toolbar hidden">
          <button id="btn-add" class="btn btn-secondary">+ 添加图片</button>
          <button id="btn-clear" class="btn btn-outline">清空</button>
        </div>

        <!-- Share section -->
        <div id="share-area" class="share-area hidden">
          <button id="btn-share" class="btn btn-primary btn-large">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            开始分享
          </button>

          <!-- Active share session -->
          <div id="active-share" class="active-share hidden">
            <div class="share-link-box">
              <p class="share-label">📤 分享链接（发给好友）：</p>
              <div class="link-row">
                <input type="text" id="share-link-input" readonly class="link-input" value="">
                <button id="btn-copy-link" class="btn btn-primary btn-small">复制</button>
              </div>
              <p class="share-hint">好友打开链接后自动连接，图片 P2P 直传</p>
            </div>
            <div class="manual-signal-box">
              <p class="share-label">🔧 自动连接失败？试试手动连接：</p>
              <button id="btn-manual-signal" class="btn btn-outline btn-small">手动信令模式</button>
            </div>
          </div>

          <!-- Manual signaling -->
          <div id="manual-signal-panel" class="manual-panel hidden">
            <p class="manual-instruction">① 复制下面的 Offer 发给好友</p>
            <textarea id="manual-offer" readonly class="signal-textarea" rows="4"></textarea>
            <button id="btn-copy-offer" class="btn btn-secondary btn-small">复制 Offer</button>
            <p class="manual-instruction" style="margin-top:16px">② 粘贴好友发回的 Answer：</p>
            <textarea id="manual-answer" class="signal-textarea" rows="4" placeholder="粘贴好友的 Answer..."></textarea>
            <button id="btn-submit-answer" class="btn btn-primary btn-small">提交 Answer</button>
          </div>
        </div>

        <!-- Transfer progress -->
        <div id="transfer-progress" class="transfer-progress hidden">
          <div class="progress-header">
            <span>📤 正在发送...</span>
            <span id="send-progress-text">0%</span>
          </div>
          <div class="progress-bar-wrap"><div id="send-progress-bar" class="progress-fill" style="width:0%"></div></div>
          <p id="send-file-name" class="progress-file"></p>
        </div>
      </div>

      <!-- ============== RECEIVER MODE ============== -->
      <div id="receiver-mode" class="hidden">
        <div id="receiver-connecting" class="receiver-state">
          <div class="loading-spinner"></div>
          <p>正在连接发送方...</p>
          <p class="state-sub" id="connecting-peer-id"></p>
        </div>

        <div id="receiver-receiving" class="receiver-state hidden">
          <div class="progress-header">
            <span>📥 正在接收...</span>
            <span id="recv-progress-text">0%</span>
          </div>
          <div class="progress-bar-wrap"><div id="recv-progress-bar" class="progress-fill" style="width:0%"></div></div>
          <p id="recv-file-name" class="progress-file"></p>
        </div>

        <div id="receiver-complete" class="receiver-state hidden">
          <div class="complete-icon">✅</div>
          <p class="complete-title">接收完成！</p>
          <p id="recv-summary" class="complete-meta"></p>
          <div id="recv-image-grid" class="recv-image-grid"></div>
          <div class="recv-actions">
            <button id="btn-save-all" class="btn btn-primary">📥 全部保存</button>
          </div>
          <p class="ios-hint hidden" id="ios-hint">iOS 提示：长按照片 →「存储到"照片"」即可逐张保存</p>
        </div>

        <div id="receiver-error" class="receiver-state hidden">
          <div class="error-icon">❌</div>
          <p id="recv-error-msg" class="error-msg">连接失败</p>
          <button id="btn-retry" class="btn btn-primary">重试</button>
        </div>
      </div>
    </main>

    <!-- Toast -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="./lib/peerjs.min.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/ui-controller.js"></script>
  <script src="./js/file-handler.js"></script>
  <script src="./js/peer-manager.js"></script>
  <script src="./js/image-viewer.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
