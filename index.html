<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PixShare">
  <meta name="description" content="P2P 图片无损直传 — 6 位数字码，无需复制粘贴">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css?v=3.0">
  <title>PixShare — P2P 无损传图</title>
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <div class="logo">📸</div>
        <div>
          <h1>PixShare <span style="font-size:0.55rem;color:var(--color-primary);background:var(--color-primary-light);padding:2px 6px;border-radius:10px;vertical-align:middle">v3.0</span></h1>
          <p class="header-sub">6 位数字连接 · 原图直传</p>
        </div>
      </div>
      <div id="connection-status" class="conn-status disconnected">
        <span class="conn-dot"></span>
        <span id="conn-text">未连接</span>
      </div>
    </header>

    <main id="main-content">

      <!-- ========== SENDER ========== -->
      <section class="role-section">
        <h2 class="role-title">📤 发送方</h2>

        <div id="drop-zone" class="drop-zone">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <p class="drop-title">点击选择要发送的图片</p>
          <p class="drop-sub">或拖拽图片到此处</p>
          <input type="file" id="file-input" multiple accept="image/*,.heic,.heif,.avif" hidden>
        </div>

        <div id="file-grid" class="file-grid hidden"></div>
        <div id="file-toolbar" class="toolbar hidden">
          <button id="btn-add" class="btn btn-secondary">+ 添加</button>
          <button id="btn-clear" class="btn btn-outline">清空</button>
        </div>

        <button id="btn-share" class="btn btn-primary btn-large hidden">开始发送</button>

        <!-- Sender: enter 6-digit code -->
        <div id="sender-panel" class="hidden">
          <p class="panel-desc">输入一个 <strong>6 位数字</strong> 作为房间号：</p>
          <div class="digit-row" id="sender-digits">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="sdigit1">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="sdigit2">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="sdigit3">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="sdigit4">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="sdigit5">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="sdigit6">
          </div>
          <button id="btn-create-room" class="btn btn-primary btn-large">创建房间</button>
          <p class="panel-hint">把这 6 位数字告诉好友，好友输入同一个数字即可连接</p>
        </div>

        <!-- Sender: waiting -->
        <div id="sender-waiting" class="hidden waiting-box">
          <div class="waiting-icon">⏳</div>
          <p class="waiting-title">等待好友加入...</p>
          <p class="waiting-code">房间号：<strong class="code-display"></strong></p>
          <p class="waiting-hint">好友输入相同 6 位数字后自动连接</p>
        </div>

        <!-- Sender: connected -->
        <div id="sender-connected" class="hidden">
          <div id="transfer-progress" class="transfer-progress">
            <div class="progress-header">
              <span>📤 正在发送...</span>
              <span id="send-progress-text">0%</span>
            </div>
            <div class="progress-bar-wrap"><div id="send-progress-bar" class="progress-fill" style="width:0%"></div></div>
            <p id="send-file-name" class="progress-file"></p>
          </div>
        </div>
      </section>

      <hr class="role-divider">

      <!-- ========== RECEIVER ========== -->
      <section class="role-section">
        <h2 class="role-title">📥 接收方</h2>

        <!-- Receiver: enter 6-digit code -->
        <div id="receiver-panel">
          <p class="panel-desc">输入发送方给的 <strong>6 位数字</strong>：</p>
          <div class="digit-row" id="receiver-digits">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="rdigit1">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="rdigit2">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="rdigit3">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="rdigit4">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="rdigit5">
            <input type="text" inputmode="numeric" maxlength="1" class="digit-input" id="rdigit6">
          </div>
          <button id="btn-join-room" class="btn btn-primary btn-large">加入房间</button>
        </div>

        <!-- Receiver: waiting -->
        <div id="receiver-waiting" class="hidden waiting-box">
          <div class="waiting-icon">⏳</div>
          <p class="waiting-title">已加入房间</p>
          <p class="waiting-code">房间号：<strong class="code-display"></strong></p>
          <p class="waiting-hint">等待发送方确认...</p>
        </div>

        <!-- Receiver: receiving -->
        <div id="receiver-receiving" class="hidden receiver-state">
          <div class="progress-header">
            <span>📥 正在接收...</span>
            <span id="recv-progress-text">0%</span>
          </div>
          <div class="progress-bar-wrap"><div id="recv-progress-bar" class="progress-fill" style="width:0%"></div></div>
          <p id="recv-file-name" class="progress-file"></p>
        </div>

        <!-- Complete -->
        <div id="receiver-complete" class="hidden receiver-state">
          <div class="complete-icon">✅</div>
          <p class="complete-title">接收完成！</p>
          <p id="recv-summary" class="complete-meta"></p>
          <div id="recv-image-grid" class="recv-image-grid"></div>
          <div class="recv-actions">
            <button id="btn-save-all" class="btn btn-primary">📥 全部保存</button>
          </div>
          <p id="ios-hint" class="ios-hint hidden">iOS：长按照片 →「存储到"照片"」逐张保存</p>
        </div>

        <!-- Error -->
        <div id="receiver-error" class="hidden receiver-state">
          <div class="error-icon">❌</div>
          <p id="recv-error-msg" class="error-msg">连接失败</p>
          <button id="btn-retry" class="btn btn-primary">🔄 重新开始</button>
        </div>
      </section>
    </main>

    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="./lib/mqtt.min.js?v=3.0"></script>
  <script src="./js/utils.js?v=3.0"></script>
  <script src="./js/mqtt-relay.js?v=3.0"></script>
  <script src="./js/ui-controller.js?v=3.0"></script>
  <script src="./js/file-handler.js?v=3.0"></script>
  <script src="./js/peer-manager.js?v=3.0"></script>
  <script src="./js/image-viewer.js?v=3.0"></script>
  <script src="./js/app.js?v=3.0"></script>
</body>
</html>
